<div class="page" *ngIf="!isLoggedIn">
  <div class="auth-container">
    <!-- Logo Header -->
    <div class="auth-header">
      <img class="logo" src="/VSU.png" alt="VSU Logo">
      <h2>Visayas State University</h2>
    </div>

    <!-- Toggle Forms -->
<div class="auth-card" role="form" aria-label="Authentication form">
      <!-- Login Form -->
      <div *ngIf="!showRegister" class="auth-form">
        <h3>Welcome Back</h3>
        <p class="subtitle">Please sign in to your account</p>

        <div class="form-field">
          <label for="login-username">Username</label>
          <input id="login-username"
                 type="text" 
                 [(ngModel)]="username" 
                 placeholder="Enter username"
                 aria-label="Username"
                 aria-describedby="username-help"
                 role="textbox">
        </div>

        <div class="form-field">
          <label for="login-password">Password</label>
          <input id="login-password"
                 type="password" 
                 [(ngModel)]="password" 
                 placeholder="Enter password"
                 aria-label="Password"
                 aria-describedby="password-help"
                 role="textbox">
        </div>

        <button (click)="login()" class="auth-btn primary" aria-label="Sign in to your account">Sign In</button>
        
        <p class="toggle-link" (click)="toggleRegister()" role="button" tabindex="0" aria-label="Toggle to sign up form">
          Don't have an account? <strong>Sign Up</strong>
        </p>
      </div>

      <!-- Register Form -->
      <app-register
        *ngIf="showRegister"
        [regUsername]="regUsername"
        [regEmail]="regEmail"
        [regPassword]="regPassword"
        [regConfirmPassword]="regConfirmPassword"
        [showRegisteredTable]="showRegisteredTable"
        [registeredUsers]="registeredUsers"
        (regUsernameChange)="regUsername = $event"
        (regEmailChange)="regEmail = $event"
        (regPasswordChange)="regPassword = $event"
        (regConfirmPasswordChange)="regConfirmPassword = $event"
        (registerSubmit)="register()"
        (toggleRegisteredUsers)="toggleRegisteredTable()"
        (backToLogin)="toggleRegister()"
      ></app-register>

      <p *ngIf="message" class="message">{{ message }}</p>
    </div>
  </div>
</div>

<app-admin *ngIf="isLoggedIn" [username]="username" (logout)="logout()"></app-admin>
