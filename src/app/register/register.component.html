<div class="auth-form" style="animation: fadeInUp 0.6s ease-out;">
  <h3>Create Account</h3>
  <p class="subtitle">Please sign up to your account</p>

  <div class="form-field">
    <label for="reg-username">Username</label>
    <input
      id="reg-username"
      type="text"
      [ngModel]="regUsername"
      (ngModelChange)="regUsernameChange.emit($event)"
      placeholder="Enter username"
      aria-label="Username"
      role="textbox">
  </div>

  <div class="form-field">
    <label for="reg-email">Email</label>
    <input
      id="reg-email"
      type="email"
      [ngModel]="regEmail"
      (ngModelChange)="regEmailChange.emit($event)"
      placeholder="Enter email"
      aria-label="Email address"
      role="textbox">
  </div>

  <div class="form-field">
    <label for="reg-password">Password</label>
    <input
      id="reg-password"
      type="password"
      [ngModel]="regPassword"
      (ngModelChange)="regPasswordChange.emit($event)"
      placeholder="Enter password"
      aria-label="Password"
      role="textbox">
  </div>

  <div class="form-field">
    <label for="reg-confirm-password">Confirm Password</label>
    <input
      id="reg-confirm-password"
      type="password"
      [ngModel]="regConfirmPassword"
      (ngModelChange)="regConfirmPasswordChange.emit($event)"
      placeholder="Confirm password"
      aria-label="Confirm password"
      role="textbox">
  </div>

  <button (click)="registerSubmit.emit()" class="auth-btn primary" aria-label="Create account">Create Account</button>
  
  <p class="toggle-link" (click)="backToLogin.emit()" role="button" tabindex="0" aria-label="Toggle to sign in form">
    Already have an account? <strong>Sign In</strong>
  </p>

  <!-- Registered users table hidden by default for clean login-like design; toggle via TS if needed -->
  <button class="auth-btn secondary" (click)="toggleRegisteredUsers.emit()" aria-label="Toggle registered users table">
    {{showRegisteredTable ? 'Hide' : 'View'}} Registered Users ({{registeredUsers.length}})
  </button>

  <div *ngIf="showRegisteredTable" class="registered-table-container">
    <div class="table-header">
      <h4>Recent Registrations</h4>
      <p>Total: {{registeredUsers.length}} users</p>
    </div>
    <div class="table" role="table" aria-label="Recent registrations table">
      <div class="table-header-row" role="rowgroup">
        <div class="table-cell header" data-label="Username" role="columnheader">Username</div>
        <div class="table-cell header" data-label="Email" role="columnheader">Email</div>
        <div class="table-cell header" data-label="Date Registered" role="columnheader">Date Registered</div>
      </div>
      <div *ngFor="let user of registeredUsers; let i = index" class="table-row" role="row" [class.new-row]="i === 0">
        <div class="table-cell" data-label="Username" role="cell">{{user.username}}</div>
        <div class="table-cell" data-label="Email" role="cell">{{user.email}}</div>
        <div class="table-cell" data-label="Date Registered" role="cell">{{i === 0 ? 'Just now' : (user.date | date:'short')}}</div>
      </div>
    </div>
  </div>
</div>
